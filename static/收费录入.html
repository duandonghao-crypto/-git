// ===== Auth =====
function showLogin(){
  fetch('/api/auth/users').then(function(r){return r.json();}).then(function(users){
    var h=''; users.forEach(function(u){ h+='<div style="padding:6px;cursor:pointer;border-radius:4px" onclick="selectUser(\''+u.name+'\')" onmouseover="this.style.background=\'#e8f0f8\'" onmouseout="this.style.background=\'\'">'+u.name+'</div>'; });
    document.getElementById('userList').innerHTML=h||'<div style="color:#999">暂无用户</div>';
    document.getElementById('loginModal').style.display='flex';
  });
}
function selectUser(name){ document.getElementById('newUserName').value=name; doLogin(); }
function doLogin(){
  var name=document.getElementById('newUserName').value.trim(); if(!name)return;
  fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name})})
  .then(function(r){return r.json();}).then(function(d){
    if(d.success){ document.getElementById('currentUserName').textContent=d.user_name; document.getElementById('loginModal').style.display='none'; location.reload(); }
  });
}
fetch('/api/auth/me').then(function(r){return r.json();}).then(function(d){
  if(d.user_name) document.getElementById('currentUserName').textContent=d.user_name;
});

function N(s){return(s||'').toLowerCase().replace(/[()\s\[\]·]/g,'');}
function FM(i,c){
  if(!i||!i.trim())return[];var n=N(i),r=[];
  for(var j=0;j<c.length;j++){var nc=N(c[j]),p=0,ok=true;
    for(var k=0;k<n.length;k++){p=nc.indexOf(n[k],p);if(p===-1){ok=false;break;}p++;}
    if(ok)r.push(c[j]);
  }
  return r.slice(0,25);
}

function handleBatchPaste(e){
  var cd=e.clipboardData;if(!cd)return;
  var text=cd.getData('text/plain');if(!text||text.indexOf('\t')===-1)return;
  var lines=text.trim().split(/\r?\n/);if(lines.length<2)return;
  e.preventDefault();
  // 检测表头（第一行是否含"户号"/"金额"等关键字）
  var hdr=lines[0].split('\t');
  var cols={hao:-1,cq:-1,addr:-1,ent:-1,amt:-1,kwh:-1,rmk:-1,month:-1};
  hdr.forEach(function(h,i){
    var n=(h||'').replace(/^\s+|\s+$/g,'');
    if(n.indexOf('\u6237\u53f7')>=0)cols.hao=i;
    if(n.indexOf('\u4ea7\u6743')>=0)cols.cq=i;
    if(n.indexOf('\u5730\u70b9')>=0||n.indexOf('\u5b89\u88c5')>=0)cols.addr=i;
    if(n.indexOf('\u4f01\u4e1a')>=0||n.indexOf('\u7f34\u8d39')>=0)cols.ent=i;
    if(n.indexOf('\u91d1\u989d')>=0||n.indexOf('\u7535\u8d39')>=0)cols.amt=i;
    if(n.indexOf('\u7535\u91cf')>=0||n.indexOf('kWh')>=0)cols.kwh=i;
    if(n.indexOf('\u5907\u6ce8')>=0)cols.rmk=i;
    if(n.indexOf('\u5e74\u6708')>=0||n.indexOf('\u6708\u4efd')>=0)cols.month=i;
  });
  var hasHdr=cols.hao>=0||cols.ent>=0;
  var start=hasHdr?1:0;
  var tb=document.getElementById('tableBody');
  var need=lines.length-start;
  while(tb.children.length<need)tb.appendChild(MR());
  BA();
  var trs=tb.querySelectorAll('tr');
  var filled=0;
  for(var i=start;i<lines.length;i++){
    var ri=i-start;if(ri>=trs.length)break;
    var parts=lines[i].split('\t');var tr=trs[ri];
    var map=hasHdr?cols:{hao:0,cq:1,addr:2,ent:3,amt:4,kwh:5,rmk:6};
    setIf(tr,'hao',map.hao>=0?parts[map.hao]:'');
    setIf(tr,'cq',map.cq>=0?parts[map.cq]:'');
    setIf(tr,'addr',map.addr>=0?parts[map.addr]:'');
    setIf(tr,'ent',map.ent>=0?parts[map.ent]:'');
    setIf(tr,'amount',map.amt>=0?parts[map.amt]:'');
    setIf(tr,'kwh',map.kwh>=0?parts[map.kwh]:'');
    setIf(tr,'remark',map.rmk>=0?parts[map.rmk]:'');
    if(map.month>=0&&parts[map.month]){
      var mv=parts[map.month].trim();var ms=document.getElementById('globalMonth');
      for(var j=0;j<ms.options.length;j++){if(ms.options[j].text.indexOf(mv.replace('\u5e74','\u5e74').replace('\u6708','\u6708'))>=0||ms.options[j].value.indexOf(mv)>=0){ms.value=ms.options[j].value;break;}}
    }
    filled++;
  }
  UC();
  ST('已粘贴 '+filled+' 行','success');
}
function setIf(tr,field,val){
  if(!val)return;var v=(val||'').replace(/^\s+|\s+$/g,'');if(!v)return;
  var inp=tr.querySelector('.'+field+'-input');if(!inp)return;
  inp.value=v;inp.classList.add('matched');inp.classList.remove('unmatched');
  // 如果是户号，触发自动带出
  if(field==='hao'&&BE){AFH(inp);}
}

  if(!confirm(msg))return;

  var tb=document.getElementById('tableBody');

  BA();

  var trs=tb.querySelectorAll('tr');

    var tr=trs[i];
    var hi=tr.querySelector('.hao-input'),ci=tr.querySelector('.cq-input'),ai=tr.querySelector('.addr-input'),ei=tr.querySelector('.ent-input');
    var ami=tr.querySelector('.amount-input'),kwi=tr.querySelector('.kwh-input'),rki=tr.querySelector('.remark-input');
    if(hi){hi.value=r.h||'';hi.classList.add('matched');}
    if(ci){ci.value=r.c||'';ci.classList.add('matched');}
    if(ai){ai.value=r.a||'';ai.classList.add('matched');}
    if(ei){ei.value=r.e||'';ei.classList.add('matched');}
    if(ami)ami.value='';
    if(kwi)kwi.value='';
    if(rki)rki.value=r.rk||'';
  });
  UC();
  ST('已载入 '+d.rows.length+' 行，请更新金额和电量','success');
}

async function checkMeterChanges(){
  var m=normMonth(document.getElementById("globalMonth").value);
  if(!m){ST("\u8bf7\u5148\u9009\u62e9\u6240\u5c5e\u5e74\u6708","error");return;}

  if(rows.length===0){ST("\u8bf7\u5148\u586b\u5199\u6237\u53f7\u548c\u4f01\u4e1a\u540d\u79f0","error");return;}
  try{
    var resp=await fetch("/api/check_meter_changes",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({month:m,rows:rows})});
    var d=await resp.json();
    if(d.conflicts&&d.conflicts.length>0){
      var s=d.conflicts.map(function(c){return c.enterprise+"\n  \u586b\u5199: "+c.currentMeter+"\n  \u5386\u53f2: "+c.historicalMeter+" ("+c.lastMonth+")";}).join("\n\n");

    }
    h2+='</table></div>';
    h2+='<p style="margin-top:8px;color:#888;font-size:12px">\u6062\u590d\u540e\u5f53\u524d\u6570\u636e\u81ea\u52a8\u5907\u4efd</p>';
    h2+='<button class="btn btn-outline" onclick="document.getElementById(\'_ov\').style.display=\'none\'">\u5173\u95ed</button>';
    if(!document.getElementById("_ov")){
      var ov=document.createElement("div");ov.id="_ov";
      ov.style.cssText="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:9999;align-items:center;justify-content:center";
      ov.onclick=function(){ov.style.display="none";};
      var bx=document.createElement("div");bx.style.cssText="background:#fff;border-radius:12px;padding:24px;max-width:700px;width:90%;box-shadow:0 8px 30px rgba(0,0,0,0.2)";
      bx.onclick=function(e){e.stopPropagation();};
      var ct=document.createElement("div");ct.id="_cv";bx.appendChild(ct);ov.appendChild(bx);
      document.body.appendChild(ov);
    }
    document.getElementById("_cv").innerHTML=h2;
    document.getElementById("_ov").style.display="flex";
  }catch(e){ST("\u52a0\u8f7d\u5931\u8d25: "+e.message,"error");}
}
async function restoreBackup(file){
  
  try{
    var resp=await fetch("/api/undo_specific_upload",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({file:file})});
    var d=await resp.json();
    ST(d.message,d.success?"success":"error");
    document.getElementById("_ov").style.display="none";
  }catch(e){ST("\u6062\u590d\u5931\u8d25: "+e.message,"error");}
}
